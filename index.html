<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Extractor - Material Code Mapper</title>
  <meta name="description"
    content="Map old material codes to new ones using a CSV lookup and an Excel file. Runs entirely in the browser." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Ambient background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <main id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <polyline points="10 9 9 9 8 9" />
        </svg>
        <h1>Code Extractor</h1>
      </div>
      <p class="subtitle">Map old material &amp; shade codes to new ones — entirely in your browser</p>
    </header>

    <!-- Steps -->
    <section class="steps-container">
      <!-- Step 1 — CSV Lookup -->
      <div class="step-card" id="step1-card">
        <div class="step-badge">1</div>
        <button class="btn-reload hidden" id="btn-reload-1" title="Re-upload lookup file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
        </button>
        <h2>Upload Lookup File</h2>
        <p>CSV or Excel file with <code>Old Material Code</code>, <code>Old Shade Code</code>, and
          <code>New Material Code</code>.</p>
        <label class="drop-zone" id="csv-drop-zone" for="csv-input">
          <input type="file" id="csv-input" accept=".csv,.xlsx,.xls" hidden />
          <div class="drop-zone-content">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <span class="drop-zone-text">Drop CSV or Excel here or <em>browse</em></span>
          </div>
          <div class="file-info" id="csv-file-info"></div>
        </label>
      </div>

      <!-- Step 2 — Excel File -->
      <div class="step-card disabled" id="step2-card">
        <div class="step-badge">2</div>
        <button class="btn-reload hidden" id="btn-reload-2" title="Re-upload Excel file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
        </button>
        <h2>Upload Excel File</h2>
        <p>Excel must contain <code>Old Material Code</code> and <code>Old Shade Code</code> columns.</p>
        <label class="drop-zone" id="excel-drop-zone" for="excel-input">
          <input type="file" id="excel-input" accept=".xlsx,.xls" hidden disabled />
          <div class="drop-zone-content">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <span class="drop-zone-text">Drop Excel here or <em>browse</em></span>
          </div>
          <div class="file-info" id="excel-file-info"></div>
        </label>
      </div>
    </section>

    <!-- Results -->
    <section class="results-section hidden" id="results-section">
      <div class="results-card">
        <h2>Results</h2>
        <div class="stats-row" id="stats-row"></div>
        <div class="table-wrapper" id="table-wrapper"></div>
        <div class="btn-row">
          <button class="btn-download" id="btn-download">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Download Updated Excel
          </button>
          <button class="btn-copy" id="btn-copy">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
            <span id="copy-label">Copy Table</span>
          </button>
          <button class="btn-copy" id="btn-copy-codes">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
              <line x1="7" y1="7" x2="7.01" y2="7" />
            </svg>
            <span id="copy-codes-label">Copy New Codes</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Toast container -->
    <div id="toast-container"></div>
  </main>

  <!-- Libraries (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
